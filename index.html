<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akıllı İletişim Asistanı</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #f8fafc;
    }

    .assistant-container {
      background: rgba(30, 41, 59, 0.7);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    h1 {
      font-size: 24px;
      color: #38bdf8;
      margin-bottom: 5px;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .key-section {
      background: rgba(15, 23, 42, 0.6);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }

    .key-section label {
      font-size: 12px;
      color: #38bdf8;
      display: block;
      margin-bottom: 5px;
    }

    .key-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: white;
      padding: 8px;
      font-size: 12px;
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: white;
      padding: 15px;
      font-size: 15px;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }

    textarea:focus {
      border-color: #38bdf8;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    button:first-child {
      background: #38bdf8;
      color: #0f172a;
    }

    button:last-child {
      background: #10b981;
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .result-box {
      margin-top: 25px;
      background: #0f172a;
      border: 1px dashed #334155;
      border-radius: 10px;
      padding: 20px;
      min-height: 80px;
    }

    .placeholder-text {
      color: #64748b;
      margin: 0;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="assistant-container">
  <h1>🤖 Akıllı İletişim Asistanı</h1>
  <p class="subtitle">Derdinizi yazın, yapay zeka profesyonel mesaja dönüştürsün.</p>
  
  <div class="key-section">
    <label for="apiKeyInput">🔑 Google API Anahtarınız (Sadece ilk seferde girin):</label>
    <input type="password" id="apiKeyInput" class="key-input" placeholder="AQ.Ab8RN6InJ... ile başlayan kodunuzu yapıştırın">
  </div>
  
  <textarea id="userInput" placeholder="Örn: Usta, dünkü yevmiyemi henüz alamadım, hesaba atabilir misin diye kibarca iste..."></textarea>
  
  <div class="button-group">
    <button onclick="transformText('profesyonel')">👔 Profesyonel Mesaj Yap</button>
    <button onclick="transformText('resmi')">⚖️ Resmi Dilekçe Yap</button>
  </div>

  <div class="result-box" id="resultBox">
    <p class="placeholder-text">Sonuç burada görünecek...</p>
  </div>
</div>

<script>
// Sayfa açıldığında daha önce kaydedilmiş anahtar varsa otomatik doldur
window.onload = function() {
  const savedKey = localStorage.getItem('user_gemini_key');
  if (savedKey) {
    document.getElementById('apiKeyInput').value = savedKey;
  }
}

async function transformText(type) {
  const userInput = document.getElementById('userInput').value;
  const resultBox = document.getElementById('resultBox');
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  
  if (!apiKey) {
    resultBox.innerHTML = "<p style='color: #ef4444; text-align: center;'>Lütfen önce en üstteki kutuya Google API anahtarınızı yapıştırın!</p>";
    return;
  }

  if (!userInput.trim()) {
    resultBox.innerHTML = "<p style='color: #ef4444; text-align: center;'>Lütfen önce kabaca bir şeyler yazın!</p>";
    return;
  }
  
  // Anahtarı telefona kaydet ki bir daha girmek zorunda kalmasın
  localStorage.setItem('user_gemini_key', apiKey);
  
  resultBox.innerHTML = "<p style='color: #38bdf8; text-align: center;'>Yapay zeka derinlemesine düşünüyor ve yazıyor... Lütfen bekleyin.</p>";
  
  let rol = "";
  if (type === 'profesyonel') {
    rol = "Sen profesyonel bir kurumsal iletişim uzmanısın. Kullanıcının kaba ve düz mantıkla yazdığı şu derdini, karşı tarafı kırmayacak ama hakkını arayan şık ve profesyonel bir iş mesajına dönüştür. Sadece mesajın kendisini ver, ekstra açıklama yazma: ";
  } else if (type === 'resmi') {
    rol = "Sen uzman bir avukatsın. Kullanıcının belirttiği şu mağduriyeti, resmi makamlara sunulabilecek, hukuki terimler içeren, resmi ve kurallara uygun bir dilekçe formatına dönüştür. Tarih, ad soyad yerlerini boş bırak. Sadece dilekçeyi ver, ekstra açıklama yazma: ";
  }

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: rol + userInput }] }]
      })
    });

    const data = await response.json();
    let aiResult = data.candidates[0].content.parts[0].text;
    
    aiResult = aiResult.replace(/\n/g, "<br>");

    resultBox.innerHTML = `<p style='color: #f8fafc; line-height: 1.6; text-align: left;'>${aiResult}</p>`;
  } catch (error) {
    resultBox.innerHTML = "<p style='color: #ef4444; text-align: center;'>Bağlantı hatası! Lütfen API anahtarınızın doğru olduğundan emin olun.</p>";
  }
}
</script>

</body>
</html>
