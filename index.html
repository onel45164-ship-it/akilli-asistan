<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akıllı İletişim Asistanı</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #f8fafc;
    }

    .assistant-container {
      background: rgba(30, 41, 59, 0.7);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    h1 {
      font-size: 26px;
      color: #38bdf8;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: white;
      padding: 15px;
      font-size: 15px;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }

    textarea:focus {
      border-color: #38bdf8;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    button:first-child {
      background: #38bdf8;
      color: #0f172a;
    }

    button:last-child {
      background: #10b981;
      color: white;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .result-box {
      margin-top: 25px;
      background: #0f172a;
      border: 1px dashed #334155;
      border-radius: 10px;
      padding: 20px;
      min-height: 80px;
    }

    .placeholder-text {
      color: #64748b;
      margin: 0;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="assistant-container">
  <h1>🤖 Akıllı İletişim Asistanı</h1>
  <p class="subtitle">Derdinizi kabaca yazın, yapay zeka profesyonel mesaja veya dilekçeye dönüştürsün.</p>
  
  <textarea id="userInput" placeholder="Örn: Usta, dünkü yevmiyemi henüz alamadım, hesaba atabilir misin diye kibarca iste..."></textarea>
  
  <div class="button-group">
    <button onclick="transformText('profesyonel')">👔 Profesyonel Mesaj Yap</button>
    <button onclick="transformText('resmi')">⚖️ Resmi Dilekçe Yap</button>
  </div>

  <div class="result-box" id="resultBox">
    <p class="placeholder-text">Sonuç burada görünecek...</p>
  </div>
</div>

<script>
function transformText(type) {
  const userInput = document.getElementById('userInput').value;
  const resultBox = document.getElementById('resultBox');
  
  if (!userInput.trim()) {
    resultBox.innerHTML = "<p style='color: #ef4444; text-align: center;'>Lütfen önce kabaca bir şeyler yazın!</p>";
    return;
  }
  
  resultBox.innerHTML = "<p style='color: #38bdf8; text-align: center;'>Yapay zeka metni dönüştürüyor... Lütfen bekleyin.</p>";
  
  setTimeout(() => {
    let finalOutput = "";
    
    if (type === 'profesyonel') {
      finalOutput = `<strong>👔 Profesyonel Mesaj Revizyonu:</strong><br><br>
      "Sayın İlgili, ${userInput} hususunda yaşamış olduğumuz süreci karşılıklı anlayış çerçevesinde çözüme kavuşturmak adına, durumun ivedilikle değerlendirilmesini ve tarafıma geri dönüş yapılmasını rica ederim. Saygılarımla."`;
    } else if (type === 'resmi') {
      finalOutput = `<strong>⚖️ Resmi Dilekçe Formatı:</strong><br><br>
      <strong>İLGİLİ MAKAMA</strong><br><br>
      Konu: ${userInput} Hakkında.<br><br>
      Yukarıda belirtilen konu kapsamında mağduriyetimin giderilmesi ve gerekli yasal işlemlerin başlatılması hususunda gereğinin yapılmasını arz ve talep ederim.<br><br>
      Adı Soyadı: [Adınız]<br>İmza: [İmza]`;
    }
    
    resultBox.innerHTML = `<p style='color: #f8fafc; line-height: 1.6;'>${finalOutput}</p>`;
  }, 1200);
}
</script>

</body>
</html>
